# Build the Next.js frontend and deploy to Hostinger via SFTP (password auth).
# Trigger: push to main, or "Run workflow" from the Actions tab.
#
# One-time setup: In GitHub repo → Settings → Secrets and variables → Actions, add:
#   FTP_HOST     — Hostinger SFTP host (from hPanel → FTP or SSH; e.g. server123.hostinger.com or your domain)
#   FTP_USERNAME — your FTP/SSH username (e.g. u752162317)
#   FTP_PASSWORD — your FTP password (Hostinger uses the same for SFTP)
# Hostinger SFTP port is 65002. Enable SSH in hPanel → Advanced → SSH Access if needed.

name: Build and deploy frontend

# Run manually from Actions tab (no auto-deploy on push)
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          NEXT_PUBLIC_API_URL= npm run build

      - name: Verify build output
        run: |
          if [ ! -f frontend/out/index.html ]; then echo "Build failed: frontend/out/index.html missing"; exit 1; fi
          echo "Build OK — $(find frontend/out -type f | wc -l) files in frontend/out/"

      - name: Deploy to Hostinger (SFTP)
        env:
          SFTP_HOST: ${{ secrets.FTP_HOST }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y sshpass rsync
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          sshpass -p "$SFTP_PASS" ssh -p 65002 -o StrictHostKeyChecking=no "$SFTP_USER@$SFTP_HOST" 'mkdir -p public_html/public'
          sshpass -p "$SFTP_PASS" rsync -avz --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            frontend/out/ "$SFTP_USER@$SFTP_HOST:public_html/public/"
